<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dekacode</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <button id="sidebarToggle" onclick="toggleSidebar()" title="Toggle sidebar">&#x2630;</button>
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">dekacode</div>
      <div class="version">v0.2.4</div>
      <button class="new-session-btn" onclick="newSession()" title="New session">+</button>
    </div>
    <div class="session-list" id="sessionList">
      <div class="session-empty">No sessions yet</div>
    </div>
    <div class="session-info" id="sessionInfo">
      <div class="info-row"><span class="label">Mode</span><span class="value mode-badge" id="modeBadge">agent</span></div>
      <div class="info-row"><span class="label">Model</span><span class="value" id="modelName">—</span></div>
      <div class="info-row"><span class="label">Tokens</span><span class="value" id="tokenCount">0</span></div>
      <div class="info-row"><span class="label">Symbols</span><span class="value" id="symbolCount">—</span></div>
    </div>
    <div class="sidebar-actions">
      <button class="action-btn" onclick="optionsMenu()" title="Options">
        <span class="icon">&#x2699;</span> Options
      </button>
      <div class="options-dropdown" id="optionsMenu">
      </div>
    </div>
  </div>
  <div id="main">
    <div id="welcome" style="display:flex">
      <img src="/logo.png" alt="Dekacode" class="welcome-logo" id="welcomeLogo">
      <div class="welcome-text">How can I help you?</div>
      <div class="welcome-project" id="welcomeProject"></div>
    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <div id="executionPanel" class="execution-panel" style="display:none">
        <div class="ep-header" onclick="toggleExecutionPanel(this)">
          <span class="spinner-small ep-spinner"></span>
          <span class="arrow">&#x25B6;</span>
          <span class="ep-status" id="execStatus">Thinking</span>
          <span class="ep-elapsed" id="execElapsed"></span>
          <button class="ep-stop" id="execStopBtn" onclick="event.stopPropagation();stopGeneration()">&#x25A0;</button>
        </div>
        <div class="ep-body" id="execBody"></div>
      </div>
      <div id="inputBar">
        <div id="cmdPanel" class="cmd-panel" style="display:none"></div>
        <textarea id="input" rows="1" placeholder="Type a message... (Enter to send, Ctrl+Enter newline, / for commands)"></textarea>
        <div class="input-actions">
          <button id="modelBtn" class="input-action-btn" onclick="toggleModelPanel()" title="Switch model">
            <span id="modelBtnLabel">Agent Flash</span>
          </button>
          <button id="sendBtn" class="input-action-btn send-btn">&#x27A4;</button>
        </div>
        <div id="modelPanel" class="model-panel" style="display:none"></div>
      </div>
      <div class="input-hint" id="inputHint"></div>
      <div id="footerNotice">Dekacode is AI-powered — verify before applying.</div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
